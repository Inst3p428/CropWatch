<h2>Add Soil Health</h2>

<form method="POST">
    <label>Date</label><br>
    <input type="date" name="date" required><br><br>

    <label>Moisture (%)</label><br>
    <input type="number" step="0.1" name="moisture" required><br><br>

    <label>Observation</label><br>
    <input type="text" name="observation"><br><br>

    <button type="submit">Save</button>
</form>
