{% extends "base.html" %}
{% block content %}

<div class="card" style="max-width:650px; margin:auto;">

    <h2 style="margin-bottom:20px;">Add Farmer</h2>

    <a href="{{ url_for('admin.dashboard') }}" class="btn btn-back">
        ← Back to Dashboard
    </a>

    <br><br>

    <form method="POST" style="display:flex; flex-direction:column; gap:15px;">

        <div>
            <label style="font-weight:600;">Full Name</label>
            <input type="text"
                   name="full_name"
                   required
                   style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:6px;">
        </div>

        <div>
            <label style="font-weight:600;">Email</label>
            <input type="email"
                   name="email"
                   required
                   style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:6px;">
        </div>

        <div>
            <label style="font-weight:600;">Password</label>
            <input type="password"
                   name="password"
                   required
                   style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:6px;">
        </div>

        <div>
            <label style="font-weight:600;">County</label>
            <input type="text"
                   name="county"
                   required
                   style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:6px;">
        </div>

        <div>
            <label style="font-weight:600;">Sub County</label>
            <input type="text"
                   name="sub_county"
                   required
                   style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:6px;">
        </div>

        <div>
            <label style="font-weight:600;">Farm Size (Acres)</label>
            <input type="number"
                   step="0.1"
                   name="farm_size_acres"
                   style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:6px;">
        </div>

        <!-- Hidden Role -->
        <input type="hidden" name="role" value="farmer">

        <button type="submit"
                class="btn btn-primary"
                style="margin-top:10px;">
            Create Farmer
        </button>

    </form>

</div>

{% endblock %}
