{% extends "base.html" %}
{% block content %}

<h2 style="margin-bottom:25px;">Admin Dashboard</h2>

<div style="
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:40px;
">

  <!-- Farmers Card -->
  <div style="
      background:white;
      padding:25px;
      border-radius:10px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
  ">
    <h4>Total Farmers</h4>
    <h2 style="margin:10px 0; color:#2563eb;">
        {{ total_farmers }}
    </h2>

    <a href="{{ url_for('admin.add_farmer') }}"
       style="
          display:inline-block;
          margin-top:10px;
          padding:8px 12px;
          background:#2563eb;
          color:white;
          border-radius:6px;
          text-decoration:none;
       ">
       + Add Farmer
    </a>
  </div>

  <!-- Officers Card -->
  <div style="
      background:white;
      padding:25px;
      border-radius:10px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
  ">
    <h4>Total Officers</h4>
    <h2 style="margin:10px 0; color:#16a34a;">
        {{ total_officers }}
    </h2>

    <a href="{{ url_for('admin.add_officer') }}"
       style="
          display:inline-block;
          margin-top:10px;
          padding:8px 12px;
          background:#16a34a;
          color:white;
          border-radius:6px;
          text-decoration:none;
       ">
       + Add Officer
    </a>
  </div>

</div>

<!-- Management Section -->
<div style="
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
">

  <h3>User Management</h3>

  <br>

  <a href="{{ url_for('admin.view_farmers') }}"
     style="
        display:block;
        padding:10px;
        background:#f3f4f6;
        border-radius:6px;
        text-decoration:none;
        margin-bottom:10px;
     ">
     Manage Farmers →
  </a>

  <a href="{{ url_for('admin.view_officers') }}"
     style="
        display:block;
        padding:10px;
        background:#f3f4f6;
        border-radius:6px;
        text-decoration:none;
     ">
     Manage Officers →
  </a>

</div>

{% endblock %}
